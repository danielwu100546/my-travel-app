<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nomad Ledger: UK & Spain</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NomadLedger">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2854/2854586.png">
    <link rel="manifest" href="manifest.json">

    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #F8FAFC;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .apple-scrolling { -webkit-overflow-scrolling: touch; }
        input, select { user-select: text !important; outline: none !important; }
        .active-tap:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 圖示組件
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // --- 數據持久化 (localStorage) ---
            const loadData = (key, defaultValue) => {
                try {
                    const saved = localStorage.getItem(key);
                    return saved ? JSON.parse(saved) : defaultValue;
                } catch (e) { return defaultValue; }
            };

            const [totalBudget, setTotalBudget] = useState(() => loadData('nomad_budget', 35000));
            const [expenses, setExpenses] = useState(() => loadData('nomad_expenses', [
                { id: '1', item: '往返機票 (倫敦進/馬德里出)', amount: 8500, cur: 'CNY', cat: 'Flight', date: '2024-01-15' },
                { id: '2', item: '倫敦住宿 (7晚)', amount: 1200, cur: 'GBP', cat: 'Stay', date: '2024-02-10' },
                { id: '3', item: '西班牙住宿 (14晚)', amount: 1400, cur: 'EUR', cat: 'Stay', date: '2024-02-15' },
                { id: '6', item: '境外旅平險', amount: 480, cur: 'CNY', cat: 'Other', date: '2024-03-01' },
                { id: '7', item: '旅行裝備 (登山鞋等)', amount: 3500, cur: 'TWD', cat: 'Gear', date: '2024-02-28' }
            ]));

            // 自動儲存到手機
            useEffect(() => { localStorage.setItem('nomad_budget', JSON.stringify(totalBudget)); }, [totalBudget]);
            useEffect(() => { localStorage.setItem('nomad_expenses', JSON.stringify(expenses)); }, [expenses]);

            // App 狀態
            const [isBudgetModalOpen, setIsBudgetModalOpen] = useState(false);
            const [tempBudget, setTempBudget] = useState(totalBudget);
            const [displayCurrency, setDisplayCurrency] = useState('CNY');
            const [activeTab, setActiveTab] = useState('home');

            // 編輯狀態
            const [editingId, setEditingId] = useState(null);
            const [editValues, setEditValues] = useState({});

            const TRIP_START = new Date('2024-03-14');
            const TRIP_END = new Date('2024-04-04');
            const rates = { EUR: 1.0, GBP: 0.83, CNY: 7.82, TWD: 34.85 };
            const symbols = { EUR: '€', GBP: '£', CNY: '¥', TWD: 'NT$' };

            const [newItem, setNewItem] = useState('');
            const [newAmount, setNewAmount] = useState('');
            const [newCur, setNewCur] = useState('GBP');
            const [newCat, setNewCat] = useState('Food');

            const categories = [
                { id: 'Flight', label: '機票', icon: 'plane', color: 'text-sky-600 bg-sky-50 border-sky-100' },
                { id: 'Stay', label: '住宿', icon: 'home', color: 'text-indigo-600 bg-indigo-50 border-indigo-100' },
                { id: 'Transport', label: '交通', icon: 'train', color: 'text-emerald-600 bg-emerald-50 border-emerald-100' },
                { id: 'Food', label: '餐飲', icon: 'coffee', color: 'text-orange-600 bg-orange-50 border-orange-100' },
                { id: 'Ticket', label: '門票', icon: 'pie-chart', color: 'text-purple-600 bg-purple-50 border-purple-100' },
                { id: 'Shopping', label: '購物', icon: 'shopping-bag', color: 'text-rose-600 bg-rose-50 border-rose-100' },
                { id: 'Gear', label: '旅行裝備', icon: 'backpack', color: 'text-amber-600 bg-amber-50 border-amber-100' },
                { id: 'Other', label: '保險/雜項', icon: 'shield-check', color: 'text-slate-600 bg-slate-50 border-slate-100' },
            ];

            const totalSpentCNY = useMemo(() => {
                return expenses.reduce((sum, exp) => sum + ((exp.amount / rates[exp.cur]) * rates.CNY), 0);
            }, [expenses]);

            const formatVal = (cnyVal, targetCur = displayCurrency) => {
                const val = (cnyVal / rates.CNY) * rates[targetCur];
                return `${symbols[targetCur]} ${val.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
            };

            const remainingCNY = totalBudget - totalSpentCNY;

            const weeklyAllowanceCNY = useMemo(() => {
                const now = new Date();
                const remDays = Math.max(Math.ceil((TRIP_END - (now < TRIP_START ? TRIP_START : now)) / 86400000), 1);
                return (remainingCNY / remDays) * 7;
            }, [remainingCNY, totalBudget]);

            const categoryStats = useMemo(() => {
                const stats = {};
                expenses.forEach(exp => {
                    const val = (exp.amount / rates[exp.cur]) * rates.CNY;
                    stats[exp.cat] = (stats[exp.cat] || 0) + val;
                });
                return stats;
            }, [expenses]);

            const handleAdd = () => {
                if (!newItem || !newAmount) return;
                setExpenses([{
                    id: Date.now().toString(),
                    item: newItem,
                    amount: parseFloat(newAmount),
                    cur: newCur,
                    cat: newCat,
                    date: new Date().toISOString().split('T')[0]
                }, ...expenses]);
                setNewItem(''); setNewAmount('');
            };

            const saveEdit = () => {
                setExpenses(expenses.map(e => e.id === editingId ? { ...editValues, amount: parseFloat(editValues.amount) } : e));
                setEditingId(null);
            };

            return (
                <div className="min-h-screen pb-32 max-w-md mx-auto relative overflow-x-hidden border-x border-slate-200 apple-scrolling shadow-2xl bg-[#F8FAFC]">
                    {/* Header */}
                    <header className="bg-[#0F172A] text-white p-6 pt-12 rounded-b-[3.5rem] shadow-2xl sticky top-0 z-[60]">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-400 p-2.5 rounded-2xl text-slate-900 shadow-xl shadow-amber-400/20"><Icon name="globe" /></div>
                                <div>
                                    <h1 className="text-sm font-black tracking-widest uppercase">Nomad Ledger</h1>
                                    <p className="text-[10px] text-slate-400 font-bold">Trip: 3/14 - 4/04</p>
                                </div>
                            </div>
                            <div className="flex bg-white/10 rounded-full p-1 border border-white/5 backdrop-blur-md">
                                {['CNY', 'TWD', 'EUR', 'GBP'].map(cur => (
                                    <button key={cur} onClick={() => setDisplayCurrency(cur)} className={`px-3 py-1.5 text-[10px] font-black rounded-full transition-all ${displayCurrency === cur ? 'bg-white text-slate-900 shadow-md' : 'text-slate-400'}`}>{cur}</button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-gradient-to-br from-white/10 to-transparent p-6 rounded-[2.5rem] border border-white/10 backdrop-blur-md">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-[11px] font-bold text-amber-400 uppercase tracking-widest">Remaining Balance</span>
                                <button onClick={() => { setTempBudget(totalBudget); setIsBudgetModalOpen(true); }} className="text-[9px] font-bold bg-white/10 px-3 py-1.5 rounded-full flex items-center gap-1 active-tap"><Icon name="settings" size={10}/> Edit Budget</button>
                            </div>
                            <p className="text-4xl font-black tracking-tighter mb-4 text-white">{formatVal(remainingCNY)}</p>
                            <div className="grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Weekly Budget</p><p className="text-lg font-black text-emerald-400 tracking-tight">{formatVal(weeklyAllowanceCNY)}</p></div>
                                <div className="text-right"><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Spent</p><p className="text-lg font-black text-rose-400 tracking-tight">{formatVal(totalSpentCNY)}</p></div>
                            </div>
                        </div>
                    </header>

                    {/* 修改預算 Modal */}
                    {isBudgetModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md animate-in">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl">
                                <h3 className="text-lg font-black mb-2 text-slate-900">修改預算上限</h3>
                                <input type="number" className="w-full bg-slate-100 rounded-2xl px-6 py-4 text-xl font-black mb-6" value={tempBudget} onChange={e => setTempBudget(Number(e.target.value))} />
                                <div className="flex gap-3">
                                    <button onClick={() => setIsBudgetModalOpen(false)} className="flex-1 font-bold text-slate-400">取消</button>
                                    <button onClick={() => { setTotalBudget(tempBudget); setIsBudgetModalOpen(false); }} className="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black">確認修改</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="px-5 -mt-6">
                        {activeTab === 'home' ? (
                            <div className="space-y-8 animate-in">
                                {/* 新增帳目區 */}
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100">
                                    <h3 className="text-[11px] font-black uppercase text-slate-400 mb-4 tracking-widest pl-1">New Entry</h3>
                                    <input type="text" placeholder="品項名稱" className="w-full bg-slate-50 rounded-2xl px-5 py-4 mb-3 text-sm font-bold focus:ring-2 focus:ring-indigo-400 transition-all" value={newItem} onChange={e => setNewItem(e.target.value)} />
                                    <div className="flex gap-3 mb-4">
                                        <input type="number" placeholder="金額" className="flex-1 bg-slate-50 rounded-2xl px-5 py-4 text-xl font-black focus:ring-2 focus:ring-indigo-400" value={newAmount} onChange={e => setNewAmount(e.target.value)} />
                                        <select className="w-24 bg-slate-100 rounded-2xl px-2 font-black text-xs appearance-none text-center" value={newCur} onChange={e => setNewCur(e.target.value)}>
                                            <option value="GBP">GBP £</option><option value="EUR">EUR €</option><option value="TWD">TWD $</option><option value="CNY">CNY ¥</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar py-2 mb-4">
                                        {categories.map(c => (
                                            <button key={c.id} onClick={() => setNewCat(c.id)} className={`shrink-0 flex items-center gap-2 px-4 py-2.5 rounded-xl text-[10px] font-black border-2 transition-all ${newCat === c.id ? 'border-indigo-500 bg-indigo-50 text-indigo-700 shadow-md scale-105' : 'border-transparent bg-slate-50 text-slate-400'}`}>
                                                <Icon name={c.icon} size={14}/> {c.label}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={handleAdd} className="w-full bg-slate-900 text-white py-4.5 rounded-[1.5rem] font-black shadow-xl active-tap flex justify-center items-center gap-2">儲存帳目 <Icon name="plus" size={16}/></button>
                                </div>

                                {/* 歷史清單 */}
                                <div className="space-y-4">
                                    <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-2">History</h3>
                                    {expenses.map(exp => {
                                        const isEditing = editingId === exp.id;
                                        const cat = categories.find(c => c.id === (isEditing ? editValues.cat : exp.cat)) || categories[0];
                                        return (
                                            <div key={exp.id} className={`bg-white p-5 rounded-[2rem] border shadow-sm transition-all ${isEditing ? 'ring-2 ring-amber-400 border-amber-200 scale-[1.02] z-50' : 'border-slate-100'}`}>
                                                {isEditing ? (
                                                    <div className="space-y-4 animate-in">
                                                        <input className="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-black" value={editValues.item} onChange={e => setEditValues({...editValues, item: e.target.value})} />
                                                        <div className="flex gap-2">
                                                            <input type="number" className="flex-1 bg-slate-50 rounded-xl px-4 py-3 text-sm font-black" value={editValues.amount} onChange={e => setEditValues({...editValues, amount: e.target.value})} />
                                                            <select className="w-20 bg-slate-100 rounded-xl px-2 font-black text-xs" value={editValues.cur} onChange={e => setEditValues({...editValues, cur: e.target.value})}>
                                                                <option value="GBP">GBP</option><option value="EUR">EUR</option><option value="TWD">TWD</option><option value="CNY">CNY</option>
                                                            </select>
                                                        </div>
                                                        <div className="flex gap-2">
                                                            <button onClick={() => setEditingId(null)} className="p-3 text-slate-400 bg-slate-100 rounded-xl flex-1 font-bold">取消</button>
                                                            <button onClick={saveEdit} className="bg-slate-900 text-white p-3 rounded-xl flex-[2] font-black">保存修改</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center justify-between group">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`p-4 rounded-2xl ${cat.color}`}><Icon name={cat.icon}/></div>
                                                            <div>
                                                                <p className="font-black text-sm text-slate-800">{exp.item}</p>
                                                                <p className="text-[10px] text-slate-400 font-bold">{exp.date} • {exp.cur} {exp.amount}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right flex items-center gap-3">
                                                            <div className="flex flex-col items-end">
                                                                <p className="font-black text-sm text-slate-800">{formatVal((exp.amount/rates[exp.cur])*rates.CNY)}</p>
                                                                <div className="flex gap-2 mt-1 opacity-40 group-hover:opacity-100">
                                                                    <button onClick={() => { setEditingId(exp.id); setEditValues({...exp}); }} className="p-1 text-indigo-500"><Icon name="edit-2" size={14}/></button>
                                                                    <button onClick={() => setExpenses(expenses.filter(e => e.id !== exp.id))} className="p-1 text-rose-500"><Icon name="trash-2" size={14}/></button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            /* 統計分頁 */
                            <div className="space-y-6 animate-in">
                                <div className="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-100">
                                    <h3 className="text-sm font-black text-slate-800 mb-8 flex items-center gap-2"><Icon name="bar-chart-3" className="text-indigo-500"/> 類別預算分析</h3>
                                    <div className="space-y-8">
                                        {categories.map(cat => {
                                            const spent = categoryStats[cat.id] || 0;
                                            const budget = totalBudget * 0.15; 
                                            const percent = Math.min((spent / budget) * 100, 100);
                                            return (
                                                <div key={cat.id}>
                                                    <div className="flex justify-between items-end mb-2 px-1">
                                                        <div className="flex items-center gap-2.5"><span className={`${cat.color} p-2 rounded-xl`}><Icon name={cat.icon} size={14}/></span><span className="text-xs font-black text-slate-700">{cat.label}</span></div>
                                                        <span className="text-xs font-black text-slate-800">{formatVal(spent)}</span>
                                                    </div>
                                                    <div className="h-4 w-full bg-slate-100 rounded-full overflow-hidden border border-slate-50">
                                                        <div className={`h-full rounded-full transition-all duration-1000 ${percent > 90 ? 'bg-rose-500' : 'bg-indigo-500'}`} style={{ width: `${percent}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 導覽列 */}
                    <div className="fixed bottom-0 left-0 right-0 h-28 bg-gradient-to-t from-[#F8FAFC] to-transparent pointer-events-none z-[80]"></div>
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-[340px] bg-slate-900/95 backdrop-blur-2xl h-18 rounded-[2.5rem] shadow-[0_20px_50px_rgba(15,23,42,0.3)] flex items-center justify-around px-8 border border-white/10 z-[100] pointer-events-auto">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'home' ? 'text-amber-400 scale-110' : 'text-slate-500'}`}><Icon name="wallet" size={22}/><span className="text-[9px] font-black uppercase tracking-tighter">Ledger</span></button>
                        <div className="h-8 w-[1.5px] bg-white/10 rounded-full"></div>
                        <button onClick={() => setActiveTab('analytics')} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === 'analytics' ? 'text-amber-400 scale-110' : 'text-slate-500'}`}><Icon name="bar-chart-3" size={22}/><span className="text-[9px] font-black uppercase tracking-tighter">Stats</span></button>
                    </nav>

                    <style>{`
                        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        .animate-in { animation: fade-in 0.4s ease-out forwards; }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
